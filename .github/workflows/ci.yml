name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.12.0'

jobs:
  quality:
    name: Typecheck · Lint · Unit · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  integration:
    name: Migrate · Seed · Integration + E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fca
          POSTGRES_PASSWORD: fca_ci_password
          POSTGRES_DB: fca_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U fca -d fca_test"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://fca:fca_ci_password@localhost:5432/fca_test?schema=public
      TEST_DATABASE_URL: postgresql://fca:fca_ci_password@localhost:5432/fca_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci_access_secret_ci_access_secret_0123456789
      JWT_REFRESH_SECRET: ci_refresh_secret_ci_refresh_secret_0123456789
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build workspace libraries (shared + database dist, prisma client)
        run: pnpm --filter @fca/shared build && pnpm --filter @fca/database build
      - name: Apply migrations
        run: pnpm db:migrate:deploy
      - name: Seed development data
        run: pnpm db:seed
      - name: Run API integration + e2e tests
        run: pnpm --filter @fca/api test
